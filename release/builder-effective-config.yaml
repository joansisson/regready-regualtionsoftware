directories:
  output: release
  buildResources: build
appId: com.regready.localpro
productName: RegReady Local Pro
files:
  - filter:
      - dist/**/*
      - dist/preload.cjs
      - dist/preload.js
      - package.json
      - preload.cjs
      - migrations/**/*
      - node_modules/better-sqlite3/**/*
      - node_modules/drizzle-orm/**/*
extraResources:
  - from: node_modules/better-sqlite3
    to: app.asar.unpacked/node_modules/better-sqlite3
asar: true
asarUnpack:
  - '**/better-sqlite3/**/*'
  - migrations/**/*
  - dist/public/**/*
win:
  target: nsis
  icon: icon/icon.png
nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
electronVersion: 37.10.3
